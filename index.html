<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>হামাকে নওগাঁ: জরুরি সেবায় আমরা</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');

        body {
            font-family: 'Hind Siliguri', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f1f8f3;
            color: #333;
        }

        /* হেডার কভার ডিজাইন: গিটহাবের cover.png ব্যবহার করা হয়েছে */
        .header {
            background: linear-gradient(to bottom, rgba(255,255,255,0.1), rgba(255,255,255,0.9)), 
                        url('cover.png'); 
            background-size: cover;
            background-position: center;
            height: 320px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .main-title {
            color: #1a4f1a;
            font-size: 26px;
            font-weight: 700;
            margin: 80px 0 5px 0;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        .sub-title {
            color: #2d5a27;
            font-size: 15px;
            margin: 0;
            font-weight: 600;
        }

        /* কার্ড বা কন্টেইনার ডিজাইন */
        .container {
            max-width: 450px;
            margin: -60px auto 30px;
            background: #ffffff;
            padding: 30px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            position: relative;
            z-index: 99;
        }

        .section-title {
            font-size: 18px;
            margin-bottom: 25px;
            color: #444;
            text-align: center;
        }

        /* ইনপুট গ্রুপ স্টাইল */
        .input-group {
            margin-bottom: 18px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #2d5a27;
            font-size: 18px;
        }

        input, select {
            width: 100%;
            padding: 14px 15px 14px 50px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            background-color: #fcfdfc;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #28a745;
            background-color: #fff;
        }

        /* সাবমিট বাটন */
        .submit-btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
            margin-top: 10px;
        }

        .privacy-note {
            font-size: 11px;
            color: #888;
            text-align: center;
            margin-top: 20px;
            line-height: 1.5;
        }

        .footer {
            text-align: center;
            padding-bottom: 30px;
            font-size: 13px;
            color: #666;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="header">
    <h1 class="main-title">হামাকে নওগাঁ: জরুরি সেবায় আমরা</h1>
    <p class="sub-title">বিপদে নওগাঁবাসীর পাশে দাঁড়ানোর একটি মানবিক উদ্যোগ</p>
</div>

<div class="container">
    <h3 class="section-title">নিরাপদে ও গোপনে আপনার তথ্য দিন</h3>
    
    <form id="blood-form">
        <div class="input-group">
            <i class="fas fa-id-card"></i>
            <input type="text" name="Name" placeholder="আপনার নাম" required>
        </div>
        
        <div class="input-group">
            <i class="fas fa-phone-alt"></i>
            <input type="tel" name="Phone" placeholder="মোবাইল নম্বর" required>
        </div>
        
        <div class="input-group">
            <i class="fas fa-tint" style="color: #c9302c;"></i>
            <select name="BloodGroup" required>
                <option value="">রক্তের গ্রুপ</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
            </select>
        </div>
        
        <div class="input-group">
            <i class="fas fa-map-marker-alt" style="color: #d9534f;"></i>
            <input type="text" name="Upazila" placeholder="উপজেলা" required>
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">
            তথ্য জমা দিতে এখানে ক্লিক করুন 
            <i class="fas fa-link"></i>
        </button>
    </form>
    
    <p class="privacy-note">* আপনার তথ্য আমাদের সুরক্ষিত ডেটাবেজে গোপন থাকবে এবং কোনো অবস্থাতেই ফেসবুকে বা কোথাও জনসমক্ষে প্রকাশ করা হবে না।</p>
</div>

<div class="footer">
    © ২০২৬ হামাকে নওগাঁ।
</div>

<script>
    // এখানে আপনার গুগল অ্যাপ স্ক্রিপ্ট থেকে পাওয়া Web App URL টি বসাবেন
    const scriptURL = 'YOUR_GOOGLE_SCRIPT_URL_HERE'; 
    const form = document.forms['blood-form'];
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', e => {
      e.preventDefault();
      
      if(scriptURL === 'YOUR_GOOGLE_SCRIPT_URL_HERE') {
          alert("দয়া করে কোডের ভেতরে আপনার Google Script URL টি বসান।");
          return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = "প্রসেসিং হচ্ছে...";

      fetch(scriptURL, { method: 'POST', body: new FormData(form)})
        .then(response => {
            alert("ধন্যবাদ! আপনার তথ্য সফলভাবে জমা হয়েছে।");
            form.reset();
            submitBtn.disabled = false;
            submitBtn.innerHTML = "তথ্য জমা দিতে এখানে ক্লিক করুন <i class='fas fa-link'></i>";
        })
        .catch(error => {
            console.error('Error!', error.message);
            alert("দুঃখিত, তথ্য জমা দেওয়া সম্ভব হয়নি।");
            submitBtn.disabled = false;
            submitBtn.innerHTML = "তথ্য জমা দিতে এখানে ক্লিক করুন <i class='fas fa-link'></i>";
        });
    });
</script>

</body>
</html>
